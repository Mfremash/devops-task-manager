apiVersion: apps/v1
kind: Deployment
metadata:
  name: laravel-backend

spec:
  replicas: 1

  selector:
    matchLabels:
      app: laravel-backend

  template:
    metadata:
      labels:
        app: laravel-backend

    spec:
      containers:
      - name: backend
        image: laravel-backend
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
